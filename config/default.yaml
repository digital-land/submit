port: 5000
asyncRequestApi: {
    url: https://publish-api.planning.data.gov.uk,
    port: 8082,
    requestsEndpoint: 'requests',
    requestTimeout: 50000
}
maintenance: {
    serviceUnavailable: false,
    upTime: "9am on Monday 19 November 2024"
}
aws: {
    region: eu-west-2,
    bucket: '',
    s3ForcePathStyle: false,
}
# ToDo: url and name might need updating
url: 'https://provide.planning.data.gov.uk'
mainWebsiteUrl: https://www.planning.data.gov.uk
dataDesignUrl: https://design.planning.data.gov.uk
downloadUrl: 'https://download.planning.data.gov.uk' 
# NOTE: this property is deprecated, use serviceNames instead
serviceName: 'Check and provide planning data'
# NOTE: the keys in this map are sometimes referred to as "serviceType" in the templates
serviceNames: {
    submit: 'Check and provide your planning data',
    check: 'Check your planning data',
    manage: 'Check and provide planning data'
}
datasetteUrl: 'https://datasette.planning.data.gov.uk'
checkService:
    # used as User-Agent header when checking the accessibility
    # of user supplied URLs
    userAgentInternal: 'GOVUK-Planning-Data:Provide'
    userAgent: 'GOVUK-Planning-Data'
templateContent:
    feedbackLink: 'https://forms.office.com/Pages/ResponsePage.aspx?id=EGg0v32c3kOociSi7zmVqML0lOlr1nBLv1MaFDrnRRxURThTVTJBSDE0Sk45V1JJQlFSRDI2RzRBMy4u'
    homepageUrl: '/'
email: {
    templates: {
        RequestTemplateId: 'fa1c2b51-3c91-4f9d-9a18-83639164d552',
        AcknowledgementTemplateId: '2a4dff6d-78c4-4fea-a489-c97485453807'
    },
    dataManagementEmail: 'fakeemail@fakemail.com'
}
validations: {
    maxFileSize: 100000000
}
contact:
  issues:
    # description: should be used for general issues, e.g. if user lands on 404 doesn't know how to proceed
    email: digitalland@communities.gov.uk
datasetsConfig:
  article-4-direction:
    guidanceUrl: /guidance/specifications/article-4-direction
    entityDisplayName:
      base: article 4
      variable: direction
    requiredFields:
      - reference
      - name
      - document-url
      - documentation-url
  article-4-direction-area:
    guidanceUrl: /guidance/specifications/article-4-direction
    entityDisplayName:
      base: article 4 direction
      variable: area
    requiredFields:
      - reference
      - geometry
      - name
      - permitted-development-rights
      - article-4-direction
  brownfield-land:
    guidanceUrl: https://www.gov.uk/government/publications/brownfield-land-registers-data-standard/publish-your-brownfield-land-data
    entityDisplayName:
      base: brownfield land
      variable: site
    requiredFields:
      - OrganisationURI
      - SiteReference
      - SiteNameAddress
      - GeoX
      - GeoY
  conservation-area:
    guidanceUrl: /guidance/specifications/conservation-area
    entityDisplayName:
      base: conservation
      variable: area
    requiredFields:
      - reference
      - geometry
      - name
  conservation-area-document:
    guidanceUrl: /guidance/specifications/conservation-area
    entityDisplayName:
      base: conservation
      variable: area
    requiredFields:
      - reference
      - name
      - conservation-area
      - document-url
      - documentation-url
      - document-type
  tree-preservation-order:
    guidanceUrl: /guidance/specifications/tree-preservation-order
    entityDisplayName:
      base: tree preservation
      variable: order
    requiredFields:
      - reference
      - document-url
      - documentation-url
  tree-preservation-zone:
    guidanceUrl: /guidance/specifications/tree-preservation-order
    entityDisplayName:
      base: tree preservation
      variable: zone
    requiredFields:
      - reference
      - geometry
      - tree-preservation-order
  tree:
    guidanceUrl: /guidance/specifications/tree-preservation-order
    entityDisplayName:
      variable: tree
    requiredFields:
      - reference
      - tree-preservation-order
      - point
      - geometry
  listed-building-outline:
    guidanceUrl: /guidance/specifications/listed-building
    entityDisplayName:
      base: listed building
      variable: outline
    requiredFields:
      - reference
      - geometry
      - name
      - listed-building
  developer-agreement-transaction:
    guidanceUrl: https://www.gov.uk/guidance/publish-your-developer-contributions-data
    entityDisplayName:
      base: developer agreement
      variable: transaction
    requiredFields:
      - reference
  developer-agreement:
    guidanceUrl: https://www.gov.uk/guidance/publish-your-developer-contributions-data
    entityDisplayName:
      base: developer
      variable: agreement
    requiredFields:
      - reference
  developer-agreement-contribution:
    guidanceUrl: https://www.gov.uk/guidance/publish-your-developer-contributions-data
    entityDisplayName:
      base: developer agreement
      variable: contribution
    requiredFields:
      - reference
  infrastructure-funding-statement:
    guidanceUrl: https://digital-land.github.io/specification/specification/infrastructure-funding-statement/
    entityDisplayName:
      base: infrastructure funding
      variable: statement
    requiredFields:
      - reference
  plan-timetable:
    guidanceUrl: https://www.gov.uk/government/publications/publish-your-plan-data/publish-your-plan-data
    entityDisplayName:
      base: plan
      variable: timetable
    requiredFields:
      - reference
      - plan
      - plan-event
      - event-date
      - entry-date
  local-plan:
    guidanceUrl: https://www.gov.uk/government/publications/publish-your-plan-data/publish-your-plan-data
    entityDisplayName:
      base: local
      variable: plan 
    requiredFields:
      - reference
      - name
      - description
      - dataset
      - period-start-date
      - period-end-date
      - local-planning-authorities
      - documentation-url
      - document-url
      - required-housing
      - entry-date
  minerals-plan:
    guidanceUrl: https://www.gov.uk/government/publications/publish-your-plan-data/publish-your-plan-data
    entityDisplayName:
      base: minerals
      variable: plan
    requiredFields:
      - reference
      - name
      - description
      - dataset
      - period-start-date
      - period-end-date
      - minerals-and-waste-planning-authorities
      - documentation-url
      - document-url
      - document-count
      - entry-date
  waste-plan:
    guidanceUrl: https://www.gov.uk/government/publications/publish-your-plan-data/publish-your-plan-data
    entityDisplayName:
      base: waste
      variable: plan
    requiredFields:
      - reference
      - name
      - description
      - dataset
      - period-start-date
      - period-end-date
      - minerals-and-waste-planning-authorities
      - documentation-url
      - document-url
      - document-count
      - entry-date
  supplementary-plan:
    guidanceUrl: https://www.gov.uk/government/publications/publish-your-plan-data/publish-your-plan-data
    entityDisplayName:
      base: supplementary
      variable: plan

# Any dataset that has one of these three previous rules set, will be displayed in the LPA Dashboard to be checked.
organisationTypes:
  - local-authority
  - national-park-authority
  - development-corporation
provisionReasons:
  - statutory
  - prospective
  - expected
  - encouraged
tablePageLength: 50
jira: {
  requestTypeId: 28
}
features:
  submitEndpointForm:
    enabled: false
  checkIssueDetailsPage:
    # https://github.com/digital-land/submit/issues/786
    # enabling this feature will cause the results page to present
    # links to individual issue pages
    enabled: true
  expectationOutOfBoundsTask:
    # this feature includes violated 'out of bounds' expectations
    # as 'tasks' on LPA overview pages etc.
    # https://github.com/digital-land/submit/issues/921
    enabled: true
  provisionBasedDatasets:
    # This feature will load datasets based on provisionReasons
    enabled: true
  nonAuthPages:
    # This feature enables pages to show non-authoritative datasets
    # If off, it will still check for local-plan datasets.
    enabled: true
